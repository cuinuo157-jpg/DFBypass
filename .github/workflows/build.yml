name: Build RootHide Tweak
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "THEOS_PACKAGE_SCHEME=roothide" >> $GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/iPhoneOS14.5.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Unzip Source
        run: |
          unzip src.zip -d build_dir

      - name: Build Tweak
        run: |
          cd build_dir
          make package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RootHide_DeltaForceBypass_DEB
          path: build_dir/packages/*.deb
